<main>
  <section class="Inicio">
    <div class="Inicio-text">
      <h1>“Educamos para crear, inspiramos para emprender.”</h1>
                  <!-- Area de cursos personalizado y notificaciones -->
            <div style="margin-top:20px; border-top:1px solid rgba(255,255,255,.02); padding-top:18px;">
                <div class="dash-header" style="align-items:center;">
                    <h2 style="font-size:18px; margin:0;">Explora Cursos Personalizados</h2>
                    <div style="margin-left:auto;">
                        <div class="notify-bar" style="margin:0;">
                            <p class="msg" style="margin:0; color:var(--muted);">Activa notificaciones para alertas
                                automáticas</p>
                            <button id="notifyBtn" class="btn-notify">🔔 Activar notificaciones</button>
                        </div>
                    </div>
                </div>

                <p class="msg">Selecciona hasta <strong>3 campos de interés</strong> para ver cursos recomendados según
                    tus preferencias.</p>

                <fieldset class="interests" style="margin-top:8px;">
                    <legend>Áreas de interés</legend>
                    <label><input type="checkbox" name="interest" value="Marketing"> Marketing</label>
                    <label><input type="checkbox" name="interest" value="Finanzas"> Finanzas</label>
                    <label><input type="checkbox" name="interest" value="Tecnología"> Tecnología</label>
                    <label><input type="checkbox" name="interest" value="Arquitectura"> Arquitectura</label>
                    <label><input type="checkbox" name="interest" value="Música"> Música</label>
                    <label><input type="checkbox" name="interest" value="Gastronomía"> Gastronomía</label>
                </fieldset>

                <section id="coursesArea">
                    <div id="coursesContainer" class="courses-grid">

                    </div>
                </section>
            </div>
      <button class="cta-btn" routerLink="/articulos" routerLinkActive="activo">Explorar artículos</button>
    </div>
    <div class="Inicio-img">
      <img src="assets/UNDERTAKE.png" alt="Intercambio digital" />
    </div>
  </section>



</main>
